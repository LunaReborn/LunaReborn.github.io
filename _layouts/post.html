<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | default: site.description }}">
  <meta name="theme-color" content="#080b12">
  <title>{{ page.title }} — {{ site.title }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/styles.css' | relative_url }}">
</head>
<body>
  <canvas id="starfield" aria-hidden="true"></canvas><div class="noise" aria-hidden="true"></div>
  <header class="site-header"><a class="logo" href="{{ '/' | relative_url }}"><span class="logo-mark">N</span><span>NEON LOG</span></a><button class="theme-toggle" id="themeToggle" type="button" aria-label="切换主题"><span class="theme-icon">☼</span></button></header>
  <main class="post-shell">
    <a class="post-back" href="{{ '/' | relative_url }}#articles">← 返回文章列表</a>
    <article>
      <header class="post-header"><span class="section-index">{{ page.category }}</span><h1>{{ page.title }}</h1><p class="post-description">{{ page.description }}</p><div class="post-meta"><time>{{ page.date | date: '%Y.%m.%d' }}</time><span>{{ page.read_time }}</span></div></header>
      <div class="post-content">{{ content }}</div>
    </article>
    <div class="post-footer"><span>© {{ 'now' | date: '%Y' }} WOXLIN</span><a href="{{ '/' | relative_url }}">NEON LOG →</a></div>
  </main>
  <script src="{{ '/script.js' | relative_url }}"></script>
</body>
</html>
